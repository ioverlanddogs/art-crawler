name: db-status

on:
  workflow_dispatch:

jobs:
  status:
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: packages/app
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DATABASE_URL_DIRECT: ${{ secrets.DATABASE_URL_DIRECT }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Validate required production DB secrets
        shell: bash
        run: |
          set -euo pipefail
          missing=()
          [[ -n "${DATABASE_URL:-}" ]] || missing+=("DATABASE_URL")
          [[ -n "${DATABASE_URL_DIRECT:-}" ]] || missing+=("DATABASE_URL_DIRECT")

          if (( ${#missing[@]} > 0 )); then
            echo "Missing required production environment secret(s): ${missing[*]}" >&2
            echo "Add missing secrets to the GitHub 'production' environment before re-running." >&2
            exit 1
          fi

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client for app
        run: npm run prisma:generate

      - name: Check migration status
        run: npm run prisma:migrate:status
