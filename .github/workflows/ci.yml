name: CI
on:
  push:
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test

  local-bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: cp .env.example .env
      - name: Export local bootstrap env
        run: |
          awk '
            /^[[:space:]]*#/ { next }
            /^[[:space:]]*$/ { next }
            /^[[:space:]]*[A-Za-z_][A-Za-z0-9_]*=.*/ {
              sub(/^[[:space:]]*/, "", $0)
              print
              next
            }
            {
              printf "Invalid .env line for GITHUB_ENV export: %s\n", $0 > "/dev/stderr"
              exit 1
            }
          ' .env >> "$GITHUB_ENV"
      - run: docker compose up -d
      - run: npm install
      - run: npm run prisma:generate -w @artio/app
      - run: npm run prisma:generate -w @artio/mining
      - run: npm run prisma:push -w @artio/app
      - run: npm run prisma:push -w @artio/mining
      - run: npm run seed:demo
      - run: npm run build
      - run: npm run test
      - run: npm run lint
