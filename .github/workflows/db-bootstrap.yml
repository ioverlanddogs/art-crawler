name: db-bootstrap
on:
  workflow_dispatch:
    inputs:
      admin_email:
        description: 'Optional initial admin email (falls back to BOOTSTRAP_ADMIN_EMAIL secret)'
        required: false
        type: string
      admin_name:
        description: 'Optional initial admin display name (falls back to BOOTSTRAP_ADMIN_NAME secret)'
        required: false
        type: string
      admin_password:
        description: 'Optional initial admin password (falls back to BOOTSTRAP_ADMIN_PASSWORD secret)'
        required: false
        type: string

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    environment: production
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DATABASE_URL_DIRECT: ${{ secrets.DATABASE_URL_DIRECT }}
      BOOTSTRAP_ADMIN_EMAIL_SECRET: ${{ secrets.BOOTSTRAP_ADMIN_EMAIL }}
      BOOTSTRAP_ADMIN_PASSWORD_SECRET: ${{ secrets.BOOTSTRAP_ADMIN_PASSWORD }}
      BOOTSTRAP_ADMIN_NAME_SECRET: ${{ secrets.BOOTSTRAP_ADMIN_NAME }}
      INPUT_ADMIN_EMAIL: ${{ inputs.admin_email }}
      INPUT_ADMIN_PASSWORD: ${{ inputs.admin_password }}
      INPUT_ADMIN_NAME: ${{ inputs.admin_name }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Validate required production DB secrets
        shell: bash
        run: |
          set -euo pipefail
          missing=()
          [[ -n "${DATABASE_URL:-}" ]] || missing+=("DATABASE_URL")
          [[ -n "${DATABASE_URL_DIRECT:-}" ]] || missing+=("DATABASE_URL_DIRECT")
          if (( ${#missing[@]} > 0 )); then
            echo "Missing required production environment secret(s): ${missing[*]}" >&2
            echo "Add missing secrets to the GitHub 'production' environment before re-running." >&2
            exit 1
          fi

      - name: Resolve bootstrap admin inputs/secrets
        shell: bash
        run: |
          set -euo pipefail

          # Hardcoded fallback credentials — used when inputs and secrets are both absent.
          # Change these before committing if you want different defaults.
          HARDCODED_EMAIL="myspchosting@gmail.com"
          HARDCODED_PASSWORD="0Preggers2!"
          HARDCODED_NAME="Primary Admin"

          admin_email="${INPUT_ADMIN_EMAIL:-${BOOTSTRAP_ADMIN_EMAIL_SECRET:-${HARDCODED_EMAIL}}}"
          admin_password="${INPUT_ADMIN_PASSWORD:-${BOOTSTRAP_ADMIN_PASSWORD_SECRET:-${HARDCODED_PASSWORD}}}"
          admin_name="${INPUT_ADMIN_NAME:-${BOOTSTRAP_ADMIN_NAME_SECRET:-${HARDCODED_NAME}}}"

          if [[ -z "${admin_email}" || -z "${admin_password}" ]]; then
            echo "Missing bootstrap admin identity." >&2
            exit 1
          fi

          echo "::add-mask::${admin_email}"
          echo "::add-mask::${admin_password}"
          if [[ -n "${admin_name}" ]]; then
            echo "::add-mask::${admin_name}"
          fi

          {
            echo "BOOTSTRAP_ADMIN_EMAIL=${admin_email}"
            echo "BOOTSTRAP_ADMIN_PASSWORD=${admin_password}"
            if [[ -n "${admin_name}" ]]; then
              echo "BOOTSTRAP_ADMIN_NAME=${admin_name}"
            fi
          } >> "$GITHUB_ENV"

      - name: Install workspace dependencies
        run: npm ci

      - name: Generate Prisma client for app
        run: npm run prisma:generate -w @artio/app

      - name: Bootstrap production app DB
        shell: bash
        run: |
          set -euo pipefail
          args=(
            --admin-email "$BOOTSTRAP_ADMIN_EMAIL"
            --admin-password "$BOOTSTRAP_ADMIN_PASSWORD"
          )
          if [[ -n "${BOOTSTRAP_ADMIN_NAME:-}" ]]; then
            args+=(--admin-name "$BOOTSTRAP_ADMIN_NAME")
          fi
          npm run bootstrap:prod-db -w @artio/app -- "${args[@]}"
